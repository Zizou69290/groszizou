<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Review</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div class="noise"></div>

  <header class="hero">
    <nav class="topbar container">
      <a class="brand" href="index.html">GROSZIZOU</a>
      <button id="menu-toggle" class="menu-toggle" aria-label="Ouvrir le menu">Menu</button>
      <ul id="menu" class="menu">
        <li><a href="index.html">Reviews</a></li>
        <li><a href="tops.html">Tops</a></li>
        <li class="menu-sep" aria-hidden="true">|</li>
        <li><a href="modifier.html">Ajouter / Modifier</a></li>
      </ul>
    </nav>
  </header>

  <header class="article-hero">
    <div class="container">
      <a class="back-link" href="index.html">Retour à l'accueil</a>
      <p class="eyebrow" id="review-category"></p>
      <h1 id="review-title"></h1>
      <p class="lede" id="review-summary"></p>
      <div class="article-meta">
        <span id="review-date"></span>
        <span id="review-score"></span>
      </div>
    </div>
  </header>

  <main class="container article-layout">
    <article>
      <img id="review-cover" class="article-cover" alt="Cover" />
      <div id="review-content" class="media-render"></div>
    </article>

    <aside class="side-card">
      <h3>Tags</h3>
      <div id="review-tags" class="tag-list"></div>
    </aside>
  </main>

  <script src="assets/js/firebase-config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="assets/js/reviews.js"></script>
  <script src="assets/js/review.js"></script>
</body>
</html>
