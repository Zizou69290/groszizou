<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SuperSite - Tops</title>
  <meta name="description" content="Tous les tops SuperSite : top 10 jeux-vidéo, films, séries..." />
  <link rel="icon" type="image/png" href="pouce.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div class="noise"></div>

  <header class="hero">
    <nav class="topbar container">
      <a class="brand" href="index.html"><img src="pouce.png" alt="" class="brand-icon" aria-hidden="true" /><span>SUPERSITE</span></a>
      <button id="menu-toggle" class="menu-toggle" aria-label="Ouvrir le menu">Menu</button>
      <ul id="menu" class="menu">
        <li><a href="index.html">Reviews</a></li>
        <li><a href="tops.html">Tops</a></li>
        <li class="menu-sep" aria-hidden="true">|</li>
        <li id="auth-menu-slot" class="auth-menu-slot"></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="container reviews-section">
      <div class="section-head">
        <div class="listing-controls">
          <div id="tops-filters" class="filters" role="group" aria-label="Filtrer les tops">
            <button class="filter-btn active" data-filter="all">Tout</button>
          </div>
          <div class="listing-selects">
            <label class="select-inline" for="tops-search">
              Recherche
              <input id="tops-search" type="search" placeholder="Titre, mots-clés..." />
            </label>
            <label class="select-inline" for="tops-sort">
              Tri
              <select id="tops-sort">
                <option value="date-desc">Plus récent</option>
                <option value="date-asc">Plus ancien</option>
                <option value="score-desc">Meilleure note</option>
                <option value="score-asc">Pire note</option>
              </select>
            </label>
            <label class="select-inline" for="tops-user-filter">
              Utilisateur
              <select id="tops-user-filter">
                <option value="all">Tous</option>
              </select>
            </label>
          </div>
        </div>
      </div>
      <p id="tops-results-meta" class="listing-meta listing-meta-floating">Chargement des contenus...</p>
      <div id="tops-grid" class="reviews-grid"></div>
    </section>
  </main>

  <script src="assets/js/firebase-config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="assets/js/reviews.js"></script>
  <script src="assets/js/auth-ui.js"></script>
  <script src="assets/js/tops.js"></script>
</body>
</html>
