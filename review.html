<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SuperSite - Review</title>
  <link rel="icon" type="image/png" href="pouce.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div class="noise"></div>

  <header class="hero">
    <nav class="topbar container">
      <a class="brand" href="index.html">SUPERSITE</a>
      <button id="menu-toggle" class="menu-toggle" aria-label="Ouvrir le menu">Menu</button>
      <ul id="menu" class="menu">
        <li><a href="index.html">Reviews</a></li>
        <li><a href="tops.html">Tops</a></li>
        <li class="menu-sep" aria-hidden="true">|</li>
        <li id="auth-menu-slot" class="auth-menu-slot"></li>
      </ul>
    </nav>
  </header>

  <header class="article-hero article-hero-covered">
    <img id="review-cover-bg" class="article-hero-bg" alt="" aria-hidden="true" />
    <div class="container article-hero-inner">
      <a class="back-link" href="index.html">Retour à l'accueil</a>
      <p class="eyebrow" id="review-category"></p>
      <h1 id="review-title"></h1>
      <p class="lede" id="review-summary"></p>
      <div class="article-meta">
        <span id="review-date"></span>
        <span id="review-score"></span>
      </div>
      <div id="review-details" class="review-details hidden"></div>
    </div>
  </header>

  <main class="container article-layout single-col">
    <article>
      <div id="review-content" class="media-render"></div>
    </article>
  </main>

  <script src="assets/js/firebase-config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="assets/js/reviews.js"></script>
  <script src="assets/js/auth-ui.js"></script>
  <script src="assets/js/review.js"></script>
</body>
</html>
