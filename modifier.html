<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SuperSite - Création</title>
  <link rel="icon" type="image/png" href="pouce.png" />
  <meta name="description" content="Créer et gérer ses reviews et tops." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div class="noise"></div>

  <header class="hero">
    <nav class="topbar container">
      <a class="brand" href="index.html">SUPERSITE</a>
      <button id="menu-toggle" class="menu-toggle" aria-label="Ouvrir le menu">Menu</button>
      <ul id="menu" class="menu">
        <li><a href="index.html">Reviews</a></li>
        <li><a href="tops.html">Tops</a></li>
        <li class="menu-sep" aria-hidden="true">|</li>
        <li id="auth-menu-slot" class="auth-menu-slot"></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="container manager-section"></section>

    <section id="manager" class="container manager-section hidden">
      <div class="section-head">
        <h2>Gestion des reviews</h2>
        <div class="manager-actions">
          <button id="new-review" class="action-btn">Nouvelle review</button>
        </div>
      </div>

      <div id="manager-list" class="manager-list"></div>

      <form id="review-form" class="review-form hidden">
        <h3 id="form-title">Ajouter une review</h3>

        <div class="form-grid">
          <label>Titre<input name="title" /></label>
          <label>Catégorie
            <select name="category">
              <option value="jeu">Jeu-vidéo</option>
              <option value="film">Film</option>
              <option value="serie">Série</option>
              <option value="musique">Musique</option>
              <option value="livre">Livre</option>
            </select>
          </label>
          <label>Date<input name="date" type="date" /></label>
          <label>Note (/10)<input name="score" type="number" min="0" max="10" step="0.1" /></label>
          <label>Image de couverture (URL)<input name="cover" type="url" /></label>
          <label>Affiche (URL)
            <input name="poster" type="url" />
          </label>
          <label id="meta-author-row">Auteur / Artiste
            <input name="author" type="text" placeholder="Ex: Frank Herbert" />
          </label>
          <label id="meta-director-row">Réalisation
            <input name="director" type="text" placeholder="Ex: Denis Villeneuve" />
          </label>
          <label id="meta-studio-row">Studio / Développeur
            <input name="studio" type="text" placeholder="Ex: FromSoftware" />
          </label>
          <label>Année de sortie
            <input name="releaseYear" type="text" placeholder="Ex: 2025" />
          </label>
          <label>Genre
            <input name="genre" type="text" placeholder="Ex: Action, RPG, Sci-Fi" />
          </label>
        </div>

        <label>Résumé
          <textarea name="summary" rows="2"></textarea>
        </label>

        <div class="content-mode-switch" role="group" aria-label="Mode d'édition">
          <button type="button" class="action-btn secondary mode-btn active" data-content-mode="blocks">Mode blocs</button>
          <button type="button" class="action-btn secondary mode-btn" data-content-mode="rich">Éditeur libre</button>
        </div>

        <div id="blocks-editor-section">
        <div class="media-head">
          <h4>Blocs de contenu (ordre libre)</h4>
          <div class="manager-actions">
            <button type="button" class="action-btn secondary" data-add-block="text">Texte</button>
            <button type="button" class="action-btn secondary" data-add-block="image">Image</button>
            <button type="button" class="action-btn secondary" data-add-block="image-text-left">Image + Texte</button>
            <button type="button" class="action-btn secondary" data-add-block="image-text-right">Texte + Image</button>
            <button type="button" class="action-btn secondary" data-add-block="two-images">2 images côte à côte</button>
            <button type="button" class="action-btn secondary" data-add-block="video">Vidéo</button>
            <button type="button" class="action-btn secondary" data-add-block="video-embed">Vidéo embed</button>
            <button type="button" class="action-btn secondary" data-add-block="audio">Audio</button>
          </div>
        </div>
        <div class="text-tools">
          <button type="button" class="action-btn secondary tool-btn" data-wrap-tag="b"><strong>B</strong></button>
          <button type="button" class="action-btn secondary tool-btn" data-wrap-tag="i"><em>I</em></button>
          <button type="button" class="action-btn secondary tool-btn" data-wrap-tag="u"><span class="u-text">U</span></button>
          <button type="button" class="action-btn secondary tool-btn" data-wrap-tag="spoiler">Spoiler</button>
          <label class="tool-inline">Couleur
            <input id="tool-color" type="color" value="#f2f2ee" />
          </label>
          <button type="button" id="tool-color-apply" class="action-btn secondary tool-btn">Appliquer couleur</button>
          <label class="tool-inline">Taille
            <select id="tool-size">
              <option value="14">14</option>
              <option value="16" selected>16</option>
              <option value="18">18</option>
              <option value="20">20</option>
              <option value="24">24</option>
              <option value="28">28</option>
            </select>
          </label>
          <button type="button" id="tool-size-apply" class="action-btn secondary tool-btn">Appliquer taille</button>
        </div>
        <div id="blocks-list" class="blocks-list"></div>
        </div>

        <div id="rich-editor-section" class="hidden">
          <div class="media-head">
            <h4>Éditeur libre</h4>
            <div class="manager-actions rich-toolbar">
              <div class="rich-tool-group">
                <button type="button" class="action-btn secondary rich-tool-btn" data-rich-cmd="bold" title="Gras"><strong>B</strong></button>
                <button type="button" class="action-btn secondary rich-tool-btn" data-rich-cmd="italic" title="Italique"><em>I</em></button>
                <button type="button" class="action-btn secondary rich-tool-btn" data-rich-cmd="underline" title="Souligné"><span class="u-text">U</span></button>
                <button type="button" class="action-btn secondary rich-tool-btn" id="rich-spoiler-btn" title="Spoiler">👁</button>
              </div>
              <div class="rich-tool-sep" aria-hidden="true"></div>
              <div class="rich-tool-group">
                <button type="button" class="action-btn secondary rich-tool-btn" data-rich-cmd="insertUnorderedList" title="Liste">•</button>
                <button type="button" class="action-btn secondary rich-tool-btn" data-rich-cmd="insertOrderedList" title="Liste numérotée">1.</button>
                <button type="button" class="action-btn secondary rich-tool-btn" data-rich-cmd="justifyLeft" title="Aligner à gauche">⟸</button>
                <button type="button" class="action-btn secondary rich-tool-btn" data-rich-cmd="justifyCenter" title="Centrer">≡</button>
                <button type="button" class="action-btn secondary rich-tool-btn" data-rich-cmd="justifyRight" title="Aligner à droite">⟹</button>
              </div>
              <div class="rich-tool-sep" aria-hidden="true"></div>
              <div class="rich-tool-group">
                <button type="button" class="action-btn secondary rich-tool-btn" id="rich-link-btn" title="Insérer lien">🔗</button>
                <button type="button" class="action-btn secondary rich-tool-btn" id="rich-image-btn" title="Insérer image">🖼</button>
                <button type="button" class="action-btn secondary rich-tool-btn" id="rich-video-btn" title="Insérer vidéo">🎬</button>
                <button type="button" class="action-btn secondary rich-tool-btn" id="rich-audio-btn" title="Insérer audio">🎵</button>
                <button type="button" class="action-btn secondary rich-tool-btn" id="rich-cols-btn" title="Insérer 2 colonnes">▥</button>
              </div>
              <div class="rich-tool-sep" aria-hidden="true"></div>
              <div class="rich-tool-group">
                <button type="button" class="action-btn secondary rich-tool-btn" data-media-size="small" title="Média petit">S</button>
                <button type="button" class="action-btn secondary rich-tool-btn" data-media-size="medium" title="Média moyen">M</button>
                <button type="button" class="action-btn secondary rich-tool-btn" data-media-size="large" title="Média grand">L</button>
                <button type="button" class="action-btn secondary rich-tool-btn" data-media-align="left" title="Média à gauche">↤</button>
                <button type="button" class="action-btn secondary rich-tool-btn" data-media-align="center" title="Média centré">↔</button>
                <button type="button" class="action-btn secondary rich-tool-btn" data-media-align="right" title="Média à droite">↦</button>
              </div>
            </div>
          </div>
          <div id="rich-editor" class="rich-editor" contenteditable="true"></div>
          <textarea id="review-body-html" name="bodyHtml" class="hidden"></textarea>
        </div>

        <h4>Prévisualisation live</h4>
        <div id="review-preview" class="preview-card"></div>

        <div class="form-actions">
          <button type="submit" class="action-btn">Enregistrer</button>
          <button type="button" id="cancel-form" class="action-btn secondary">Annuler</button>
        </div>
      </form>

      <hr class="separator" />

      <div class="section-head">
        <h2>Gestion des tops</h2>
        <button id="new-top" class="action-btn">Nouveau top</button>
      </div>

      <div id="tops-manager-list" class="manager-list"></div>

      <form id="top-form" class="review-form hidden">
        <h3 id="top-form-title">Ajouter un top</h3>

        <div class="form-grid">
          <label>Titre<input name="title" /></label>
          <label>Catégorie
            <select name="category">
              <option value="jeu">Jeux-vidéo</option>
              <option value="film">Films</option>
              <option value="serie">Séries</option>
              <option value="musique">Musiques</option>
              <option value="livre">Livres</option>
              <option value="autre">Autre</option>
            </select>
          </label>
          <label>Année / période<input name="year" placeholder="2025" /></label>
          <label>Image de couverture (URL)<input name="cover" type="url" /></label>
        </div>

        <label>Sous-titre
          <textarea name="subtitle" rows="2" placeholder="Top 10 films 2025"></textarea>
        </label>

        <div class="media-head">
          <h4>Items du top</h4>
          <button type="button" id="add-top-item" class="action-btn secondary">Ajouter un item</button>
        </div>
        <div id="top-items-list" class="blocks-list"></div>

        <div class="form-actions">
          <button type="submit" class="action-btn">Enregistrer</button>
          <button type="button" id="cancel-top-form" class="action-btn secondary">Annuler</button>
        </div>
      </form>
    </section>
  </main>

  <script src="assets/js/firebase-config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="assets/js/reviews.js"></script>
  <script src="assets/js/auth-ui.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
