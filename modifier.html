<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ajouter / Modifier - GROSZIZOU Reviews</title>
  <meta name="description" content="Ajouter ou modifier les reviews de GROSZIZOU." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div class="noise"></div>

  <header class="hero">
    <nav class="topbar container">
      <a class="brand" href="index.html">GROSZIZOU</a>
      <button id="menu-toggle" class="menu-toggle" aria-label="Ouvrir le menu">Menu</button>
      <ul id="menu" class="menu">
        <li><a href="modifier.html">Ajouter / Modifier</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="container manager-section">
      <div class="token-box">
        <label>Mot de passe
          <input id="admin-password" type="password" placeholder="Mot de passe admin" />
        </label>
        <p id="auth-status" class="media-note">Verrouillé</p>
        <div class="row-actions">
          <button id="admin-login" class="action-btn">Débloquer</button>
          <button id="admin-logout" class="action-btn secondary">Verrouiller</button>
        </div>
      </div>
    </section>

    <section id="manager" class="container manager-section hidden">
      <div class="section-head">
        <h2>Gestion des reviews</h2>
        <div class="manager-actions">
          <button id="new-review" class="action-btn">Nouvelle review</button>
          <button id="export-json" class="action-btn secondary">Exporter JSON</button>
          <label class="import-label" for="import-json">Importer JSON</label>
          <input id="import-json" type="file" accept="application/json" />
        </div>
      </div>

      <div id="manager-list" class="manager-list"></div>

      <form id="review-form" class="review-form hidden">
        <h3 id="form-title">Ajouter une review</h3>

        <div class="form-grid">
          <label>Titre<input name="title" /></label>
          <label>Catégorie
            <select name="category">
              <option value="jeu">Jeu-vidéo</option>
              <option value="film">Film</option>
              <option value="serie">Série</option>
              <option value="musique">Musique</option>
              <option value="livre">Livre</option>
            </select>
          </label>
          <label>Date<input name="date" type="date" /></label>
          <label>Note (/10)<input name="score" type="number" min="0" max="10" step="0.1" /></label>
          <label>Image de couverture (URL)<input name="cover" type="url" /></label>
          <label>Couleur d'accent (hex)
            <input name="accent" type="text" placeholder="#f25f29" />
          </label>
        </div>

        <label>Résumé
          <textarea name="summary" rows="2"></textarea>
        </label>

        <div class="media-head">
          <h4>Blocs de contenu (ordre libre)</h4>
          <div class="manager-actions">
            <button type="button" class="action-btn secondary" data-add-block="text">+ Texte</button>
            <button type="button" class="action-btn secondary" data-add-block="image">+ Image</button>
            <button type="button" class="action-btn secondary" data-add-block="video">+ Vidéo</button>
            <button type="button" class="action-btn secondary" data-add-block="video-embed">+ Vidéo embed</button>
            <button type="button" class="action-btn secondary" data-add-block="audio">+ Audio</button>
          </div>
        </div>
        <p class="media-note">Tu peux mélanger comme tu veux: texte, image, texte, vidéo, etc. (URLs uniquement).</p>
        <div id="blocks-list" class="blocks-list"></div>

        <div class="form-actions">
          <button type="submit" class="action-btn">Enregistrer</button>
          <button type="button" id="cancel-form" class="action-btn secondary">Annuler</button>
        </div>
      </form>
    </section>
  </main>

  <script src="assets/js/firebase-config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="assets/js/reviews.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
