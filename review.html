<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Review</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div class="noise"></div>

  <header class="article-hero">
    <div class="container">
      <a class="back-link" href="index.html">Retour a l'accueil</a>
      <p class="eyebrow" id="review-category"></p>
      <h1 id="review-title"></h1>
      <p class="lede" id="review-summary"></p>
      <div class="article-meta">
        <span id="review-date"></span>
        <span id="review-score"></span>
      </div>
    </div>
  </header>

  <main class="container article-layout">
    <article>
      <img id="review-cover" class="article-cover" alt="Cover" />
      <div id="review-body" class="review-body"></div>
      <h2>Medias</h2>
      <div id="review-media" class="media-render"></div>
    </article>

    <aside class="side-card">
      <h3>Tags</h3>
      <div id="review-tags" class="tag-list"></div>
    </aside>
  </main>

  <script src="assets/js/reviews.js"></script>
  <script src="assets/js/review.js"></script>
</body>
</html>
