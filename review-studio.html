<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SuperSite - Nouvelle review</title>
  <link rel="icon" type="image/png" href="pouce.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body class="review-studio-page">
  <div class="noise"></div>

  <header class="hero">
    <nav class="topbar container">
      <a class="brand" href="index.html"><img src="pouce.png" alt="" class="brand-icon" aria-hidden="true" /><span>SUPERSITE</span></a>
      <button id="menu-toggle" class="menu-toggle" aria-label="Ouvrir le menu">Menu</button>
      <ul id="menu" class="menu">
        <li><a href="index.html">Reviews</a></li>
        <li><a href="tops.html">Tops</a></li>
        <li class="menu-item-has-submenu">
          <a href="watch-parter-watchlist.html">Watch Parter</a>
          <ul class="submenu" aria-label="Sous-menu Watch Parter">
            <li><a href="watch-parter-watchlist.html">Watchlist</a></li>
            <li><a href="watch-parter-courter.html">Watchlist Courts</a></li>
            <li><a href="watch-parter-duel.html">Duel de films</a></li>
            <li><a href="watch-parter-bingo.html">Bingo</a></li>
          </ul>
        </li>
        <li class="menu-sep" aria-hidden="true">|</li>
        <li id="auth-menu-slot" class="auth-menu-slot"></li>
      </ul>
    </nav>
  </header>

  <header class="article-hero article-hero-covered studio-hero">
    <img id="studio-cover-bg" class="article-hero-bg" alt="" aria-hidden="true" />
    <div class="container article-hero-inner">
      <div class="hero-links">
        <a class="back-link" href="index.html">Retour</a>
      </div>
      <p class="eyebrow">Brouillon</p>
      <div class="studio-title-wrap has-tmdb-autocomplete">
        <input id="studio-title" class="studio-title-input" type="text" placeholder="Titre de la review" />
      </div>
      <textarea id="studio-summary" class="studio-summary-input" rows="2" placeholder="Résumé (optionnel)"></textarea>

      <div class="studio-fields-grid">
        <div class="studio-fields-left">
          <div class="studio-fields-row studio-fields-row-3">
            <label class="studio-meta-chip">
              <span>Catégorie</span>
              <select name="category" form="studio-meta-form" required>
                <option value="jeu">Jeu-vidéo</option>
                <option value="film" selected>Film</option>
                <option value="serie">Série</option>
                <option value="musique">Musique</option>
                <option value="livre">Livre</option>
                <option value="autre">Autre</option>
              </select>
            </label>
            <label class="studio-meta-chip">
              <span>Date</span>
              <input name="date" type="date" form="studio-meta-form" required />
            </label>
            <label class="studio-meta-chip">
              <span>Statut</span>
              <select name="status" form="studio-meta-form" required>
                <option value="draft" selected>Brouillon</option>
                <option value="published">Publié</option>
              </select>
            </label>
          </div>
          <div class="studio-fields-row studio-fields-row-3">
            <label class="studio-meta-chip">
              <span>Réal</span>
              <input name="director" type="text" form="studio-meta-form" placeholder="Ex: Denis Villeneuve" />
            </label>
            <label class="studio-meta-chip">
              <span>Année</span>
              <input name="releaseYear" type="text" form="studio-meta-form" placeholder="2025" />
            </label>
            <label class="studio-meta-chip">
              <span>Note</span>
              <input name="score" type="number" min="0" max="10" step="0.1" form="studio-meta-form" placeholder="/10" />
            </label>
          </div>
        </div>

        <div class="studio-fields-right">
          <div class="studio-asset-group compact">
            <span class="studio-asset-label">Affiche</span>
            <button id="studio-poster-picker-btn" type="button" class="action-btn secondary studio-asset-btn">Modifier via TMDB</button>
            <button id="studio-poster-url-btn" type="button" class="action-btn secondary studio-asset-btn">URL</button>
          </div>
          <div class="studio-asset-group compact">
            <span class="studio-asset-label">Couv</span>
            <button id="studio-cover-picker-btn" type="button" class="action-btn secondary studio-asset-btn">Modifier via TMDB</button>
            <button id="studio-cover-url-btn" type="button" class="action-btn secondary studio-asset-btn">URL</button>
          </div>
          <label class="studio-meta-chip studio-music-chip">
            <span>Musique</span>
            <input name="bgMusic" type="url" form="studio-meta-form" placeholder="https://..." />
          </label>
        </div>
      </div>
    </div>
  </header>

  <main class="container">
    <p id="studio-guest-note" class="manager-guest-note hidden">Connexion requise pour créer une review.</p>

    <section id="studio-workspace" class="studio-layout hidden">
      <form id="studio-meta-form" class="studio-hidden-form">
        <input name="poster" type="hidden" />
        <input name="cover" type="hidden" />
        <input name="tmdbOverview" type="hidden" />
        <input name="tmdbId" type="hidden" />
        <input name="tmdbMediaType" type="hidden" />
      </form>

      <section class="studio-editor-card">
        <label class="studio-synopsis-field">
          <span class="label-row"><span class="field-label-text">Synopsis</span><span class="field-hint">optionnel</span></span>
          <textarea id="studio-synopsis-input" rows="2" placeholder="Synopsis TMDB ou personnalisé"></textarea>
        </label>
        <div class="content-mode-switch studio-content-mode-switch" role="group" aria-label="Mode d'édition">
          <button type="button" class="action-btn secondary mode-btn active" data-studio-content-mode="blocks">Mode Blocs</button>
          <button type="button" class="action-btn secondary mode-btn" data-studio-content-mode="rich">Mode Studio (pas stable)</button>
        </div>

        <section id="studio-rich-editor-section">
          <div class="text-tools studio-text-tools">
          <div class="rich-tool-group">
            <button type="button" class="action-btn secondary tool-btn hidden" id="studio-add-block-btn" title="Ajouter un bloc">+ Bloc</button>
            <button type="button" class="action-btn secondary tool-btn" data-studio-wrap="b" title="Gras"><strong>B</strong></button>
            <button type="button" class="action-btn secondary tool-btn" data-studio-wrap="i" title="Italique"><em>I</em></button>
            <button type="button" class="action-btn secondary tool-btn" data-studio-wrap="u" title="Souligné"><span class="u-text">U</span></button>
            <button type="button" class="action-btn secondary tool-btn" data-studio-action="strike" title="Barré"><span style="text-decoration:line-through">S</span></button>
            <button type="button" class="action-btn secondary tool-btn" data-studio-wrap="spoiler" title="Spoiler">&#128065;</button>
          </div>
          <div class="rich-tool-group">
            <button type="button" class="action-btn secondary tool-btn" data-studio-action="quote" title="Citation">&#10077;</button>
            <button type="button" class="action-btn secondary tool-btn" data-studio-action="url" title="Lien">&#128279;</button>
            <button type="button" class="action-btn secondary tool-btn" id="studio-image-btn" title="Insérer image">Img</button>
            <button type="button" class="action-btn secondary tool-btn" id="studio-video-btn" title="Insérer vidéo">Vid</button>
          </div>
          <div class="rich-tool-group">
            <label class="tool-inline" title="Taille texte">
              <select id="studio-tool-size">
                <option value="14">14</option>
                <option value="16" selected>16</option>
                <option value="18">18</option>
                <option value="20">20</option>
                <option value="24">24</option>
                <option value="28">28</option>
              </select>
            </label>
            <button type="button" class="action-btn secondary tool-btn" id="studio-tool-size-apply" title="Appliquer taille">&#10003;</button>
            <label class="tool-inline" title="Couleur texte">
              <input id="studio-tool-color" type="color" value="#f2f2ee" />
            </label>
            <button type="button" class="action-btn secondary tool-btn" id="studio-tool-color-apply" title="Appliquer couleur">&#10003;</button>
            <label class="tool-inline" title="Surlignage texte">
              <input id="studio-tool-highlight" type="color" value="#f7b538" />
            </label>
            <button type="button" class="action-btn secondary tool-btn" id="studio-tool-highlight-apply" title="Appliquer surlignage">&#10003;</button>
          </div>
          <div class="rich-tool-group">
            <button type="button" class="action-btn secondary tool-btn" data-studio-action="left" title="Aligner à gauche">&larr;</button>
            <button type="button" class="action-btn secondary tool-btn" data-studio-action="center" title="Centrer">&harr;</button>
            <button type="button" class="action-btn secondary tool-btn" data-studio-action="right" title="Aligner à droite">&rarr;</button>
            <button type="button" class="action-btn secondary tool-btn" data-studio-action="justify" title="Justifier">&#9776;</button>
          </div>
          <div class="rich-tool-group">
            <button type="button" class="action-btn secondary tool-btn" data-studio-action="ul" title="Liste à puces">&#8226;</button>
            <button type="button" class="action-btn secondary tool-btn" data-studio-action="ol" title="Liste numérotée">1.</button>
          </div>
          <div class="rich-tool-group">
            <button type="button" class="action-btn secondary tool-btn" data-studio-action="undo" title="Annuler">&#8630;</button>
            <button type="button" class="action-btn secondary tool-btn" data-studio-action="redo" title="Restaurer">&#8631;</button>
            <button type="button" class="action-btn secondary tool-btn" data-studio-action="clear" title="Enlever mise en page">Tx</button>
          </div>
          </div>
          <div id="studio-editor" class="rich-editor studio-editor" contenteditable="true" data-placeholder="Commence ta review ici..."></div>
        </section>

        <section id="studio-blocks-editor-section" class="hidden">
          <div id="studio-blocks-list" class="blocks-list"></div>
        </section>

        <div class="form-actions studio-editor-actions">
          <button id="studio-delete-review" type="button" class="action-btn danger studio-delete-btn hidden">Supprimer</button>
          <button id="studio-save-draft" type="button" class="action-btn secondary">Enregistrer brouillon</button>
          <button id="studio-save-publish" type="button" class="action-btn">Publier</button>
        </div>
      </section>
    </section>
  </main>

  <script src="assets/js/firebase-config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="assets/js/reviews.js"></script>
  <script src="assets/js/auth-ui.js"></script>
  <script src="assets/js/review-studio.js"></script>
</body>
</html>
