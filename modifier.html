<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SuperSite - Création</title>
  <link rel="icon" type="image/png" href="pouce.png" />
  <meta name="description" content="Créer et gérer ses reviews et tops." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body class="manager-page">
  <div class="noise"></div>

  <header class="hero">
    <nav class="topbar container">
      <a class="brand" href="index.html"><img src="pouce.png" alt="" class="brand-icon" aria-hidden="true" /><span>SUPERSITE</span></a>
      <button id="menu-toggle" class="menu-toggle" aria-label="Ouvrir le menu">Menu</button>
      <ul id="menu" class="menu">
        <li><a href="index.html">Reviews</a></li>
        <li><a href="tops.html">Tops</a></li>
        <li class="menu-sep" aria-hidden="true">|</li>
        <li id="auth-menu-slot" class="auth-menu-slot"></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="container manager-section">
      <p id="manager-guest-message" class="manager-guest-note hidden">Y'a rien à voir ici, connecte-toi</p>
    </section>

    <section id="manager" class="container manager-section hidden">
      <div class="section-head">
        <h2>Gestion des reviews</h2>
        <div class="manager-actions">
          <label class="select-inline" for="manager-reviews-search">
            Recherche
            <input id="manager-reviews-search" type="search" placeholder="Titre, catégorie, auteur..." />
          </label>
          <label class="select-inline" for="manager-reviews-sort">
            Tri
            <select id="manager-reviews-sort">
              <option value="date-desc">Plus récent</option>
              <option value="date-asc">Plus ancien</option>
            </select>
          </label>
          <button id="new-review" class="action-btn">Nouvelle review</button>
        </div>
      </div>

      <div id="manager-list" class="manager-list"></div>

      <form id="review-form" class="review-form hidden">
        <h3 id="form-title">Ajouter une review</h3>
        <div class="form-grid">
          <label><span class="label-row"><span class="field-label-text">Titre</span><span class="field-hint field-required">obligatoire</span></span><input name="title" required /></label>
          <label><span class="label-row"><span class="field-label-text">Catégorie</span><span class="field-hint field-required">obligatoire</span></span>
            <select name="category" required>
              <option value="jeu">Jeu-vidéo</option>
              <option value="film" selected>Film</option>
              <option value="serie">Série</option>
              <option value="musique">Musique</option>
              <option value="livre">Livre</option>
            </select>
          </label>
          <label><span class="label-row"><span class="field-label-text">Date de publication</span><span class="field-hint field-required">obligatoire</span></span><input name="date" type="date" required /></label>
          <label><span class="label-row"><span class="field-label-text">Statut</span><span class="field-hint field-required">obligatoire</span></span>
            <select name="status" required>
              <option value="published" selected>Publié</option>
              <option value="draft">Brouillon</option>
            </select>
          </label>
          <label><span class="label-row"><span class="field-label-text">Note (/10)</span><span class="field-hint">optionnel</span></span><input name="score" type="number" min="0" max="10" step="0.1" /></label>
          <label id="meta-director-row"><span class="label-row"><span class="field-label-text">Réalisation</span><span class="field-hint">optionnel</span></span>
            <input name="director" type="text" placeholder="Ex: Denis Villeneuve" />
          </label>
          <label><span class="label-row"><span class="field-label-text">Année de sortie</span><span class="field-hint">optionnel</span></span>
            <input name="releaseYear" type="text" placeholder="Ex: 2025" />
          </label>
          <label><span class="label-row"><span class="field-label-text">Affiche (URL)</span><span class="field-hint">optionnel</span></span>
            <input name="poster" type="url" />
          </label>
          <label><span class="label-row"><span class="field-label-text">Couverture (URL)</span><span class="field-hint">optionnel</span></span><input name="cover" type="url" /></label>
          <label><span class="label-row"><span class="field-label-text">Musique de fond (URL)</span><span class="field-hint">optionnel</span></span>
            <input name="bgMusic" type="url" placeholder="https://..." />
          </label>
          <div class="external-links-section">
            <div class="media-head external-links-head">
              <button type="button" id="add-external-link-btn" class="action-btn secondary external-add-btn">+ Ajouter un bouton</button>
            </div>
            <div id="external-links-list" class="external-links-list"></div>
          </div>
        </div>

        <label><span class="label-row"><span class="field-label-text">Résumé</span><span class="field-hint">optionnel</span></span>
          <textarea name="summary" rows="2"></textarea>
        </label>

        <div class="content-mode-switch" role="group" aria-label="Mode d'édition">
          <button type="button" class="action-btn secondary mode-btn active" data-content-mode="blocks">Mode blocs</button>
          <button type="button" class="action-btn secondary mode-btn" data-content-mode="rich">Éditeur libre (pas conseillé, inshallah bientôt)</button>
        </div>

        <div id="blocks-editor-section">
        <div class="text-tools">
          <div class="rich-tool-group">
            <button type="button" class="action-btn secondary tool-btn" id="add-block-btn" title="Ajouter un bloc">+ Bloc</button>
          </div>
          <div class="rich-tool-group">
            <button type="button" class="action-btn secondary tool-btn" data-wrap-tag="b" title="Gras"><strong>B</strong></button>
            <button type="button" class="action-btn secondary tool-btn" data-wrap-tag="i" title="Italique"><em>I</em></button>
            <button type="button" class="action-btn secondary tool-btn" data-wrap-tag="u" title="Souligné"><span class="u-text">U</span></button>
            <button type="button" class="action-btn secondary tool-btn" data-block-action="strike" title="Barré"><span style="text-decoration:line-through">S</span></button>
            <button type="button" class="action-btn secondary tool-btn" data-wrap-tag="spoiler" title="Spoiler">&#128065;</button>
            <button type="button" class="action-btn secondary tool-btn" data-block-action="quote" title="Citation">&#10077;</button>
            <button type="button" class="action-btn secondary tool-btn" data-block-action="url" title="Lien">&#128279;</button>
          </div>
          <div class="rich-tool-group">
            <label class="tool-inline" title="Taille texte">
              <select id="tool-size">
                <option value="14">14</option>
                <option value="16" selected>16</option>
                <option value="18">18</option>
                <option value="20">20</option>
                <option value="24">24</option>
                <option value="28">28</option>
              </select>
            </label>
            <button type="button" class="action-btn secondary tool-btn" id="tool-size-apply" title="Appliquer taille">&#10003;</button>
            <label class="tool-inline" title="Couleur texte">
              <input id="tool-color" type="color" value="#f2f2ee" />
            </label>
            <button type="button" class="action-btn secondary tool-btn" id="tool-color-apply" title="Appliquer couleur">&#10003;</button>
            <label class="tool-inline" title="Surlignage texte">
              <input id="tool-highlight" type="color" value="#f7b538" />
            </label>
            <button type="button" class="action-btn secondary tool-btn" id="tool-highlight-apply" title="Appliquer surlignage">&#10003;</button>
          </div>
          <div class="rich-tool-group">
            <button type="button" class="action-btn secondary tool-btn" data-block-action="left" title="Aligner à gauche">&larr;</button>
            <button type="button" class="action-btn secondary tool-btn" data-block-action="center" title="Centrer">&harr;</button>
            <button type="button" class="action-btn secondary tool-btn" data-block-action="right" title="Aligner à droite">&rarr;</button>
            <button type="button" class="action-btn secondary tool-btn" data-block-action="justify" title="Justifier">&#9776;</button>
          </div>
          <div class="rich-tool-group">
            <button type="button" class="action-btn secondary tool-btn" data-block-action="ol" title="Liste numérotée">1.</button>
            <button type="button" class="action-btn secondary tool-btn" data-block-action="ul" title="Liste à puces">&#8226;</button>
          </div>
          <div class="rich-tool-group">
            <button type="button" class="action-btn secondary tool-btn" data-block-action="undo" title="Annuler">&#8630;</button>
            <button type="button" class="action-btn secondary tool-btn" data-block-action="redo" title="Restaurer">&#8631;</button>
            <button type="button" class="action-btn secondary tool-btn" data-block-action="clear" title="Enlever mise en page">Tx</button>
          </div>
        </div>
        <div id="blocks-list" class="blocks-list"></div>
        </div>

        <div id="rich-editor-section" class="hidden">
          <div class="media-head">
            <h4>Éditeur libre</h4>
            <div class="manager-actions rich-toolbar">
              <div class="rich-tool-group">
            <button type="button" class="action-btn secondary rich-tool-btn" data-rich-cmd="bold" title="Gras"><strong>B</strong></button>
            <button type="button" class="action-btn secondary rich-tool-btn" data-rich-cmd="italic" title="Italique"><em>I</em></button>
            <button type="button" class="action-btn secondary rich-tool-btn" data-rich-cmd="underline" title="Souligné"><span class="u-text">U</span></button>
            <button type="button" class="action-btn secondary rich-tool-btn" data-rich-cmd="strikeThrough" title="Barré"><span style="text-decoration:line-through">S</span></button>
            <button type="button" class="action-btn secondary rich-tool-btn" id="rich-spoiler-btn" title="Spoiler">&#128065;</button>
            <button type="button" class="action-btn secondary rich-tool-btn" data-rich-cmd="formatBlock" data-rich-value="blockquote" title="Citation">&#10077;</button>
          </div>
          <div class="rich-tool-sep" aria-hidden="true"></div>
          <div class="rich-tool-group">
            <button type="button" class="action-btn secondary rich-tool-btn" data-rich-cmd="insertUnorderedList" title="Liste">&#8226;</button>
            <button type="button" class="action-btn secondary rich-tool-btn" data-rich-cmd="insertOrderedList" title="Liste numérotée">1.</button>
            <button type="button" class="action-btn secondary rich-tool-btn" data-rich-cmd="justifyLeft" title="Aligner à gauche">&larr;</button>
            <button type="button" class="action-btn secondary rich-tool-btn" data-rich-cmd="justifyCenter" title="Centrer">&harr;</button>
            <button type="button" class="action-btn secondary rich-tool-btn" data-rich-cmd="justifyRight" title="Aligner à droite">&rarr;</button>
          </div>
          <div class="rich-tool-sep" aria-hidden="true"></div>
          <div class="rich-tool-group">
            <button type="button" class="action-btn secondary rich-tool-btn" id="rich-link-btn" title="Insérer lien">Link</button>
            <button type="button" class="action-btn secondary rich-tool-btn" id="rich-image-btn" title="Insérer image">Img</button>
            <button type="button" class="action-btn secondary rich-tool-btn" id="rich-video-btn" title="Insérer vidéo">Vid</button>
            <button type="button" class="action-btn secondary rich-tool-btn" id="rich-audio-btn" title="Insérer audio">Aud</button>
            <button type="button" class="action-btn secondary rich-tool-btn" data-media-align="left" title="Média à gauche">&larr;</button>
            <button type="button" class="action-btn secondary rich-tool-btn" data-media-align="center" title="Média centré">&harr;</button>
            <button type="button" class="action-btn secondary rich-tool-btn" data-media-align="right" title="Média à droite">&rarr;</button>
          </div>
              <div class="rich-tool-sep" aria-hidden="true"></div>
              <div class="rich-tool-group">
                <label class="tool-inline" title="Couleur texte">
                  <input id="rich-color" type="color" value="#f2f2ee" />
                </label>
                <label class="tool-inline" title="Taille texte">
                  <select id="rich-size">
                    <option value="14">14</option>
                    <option value="16" selected>16</option>
                    <option value="18">18</option>
                    <option value="20">20</option>
                    <option value="24">24</option>
                    <option value="28">28</option>
                  </select>
                </label>
              </div>
	              <div class="rich-tool-sep" aria-hidden="true"></div>
	              <div class="rich-tool-group">
	                <button type="button" class="action-btn secondary rich-tool-btn" data-rich-cmd="undo" title="Annuler">&#8630;</button>
	                <button type="button" class="action-btn secondary rich-tool-btn" data-rich-cmd="redo" title="Rétablir">&#8631;</button>
	                <button type="button" class="action-btn secondary rich-tool-btn" data-rich-cmd="removeFormat" title="Effacer format">Tx</button>
	              </div>
	            </div>
	          </div>
          <div id="rich-editor" class="rich-editor" contenteditable="true"></div>
          <textarea id="review-body-html" name="bodyHtml" class="hidden"></textarea>
        </div>

        <h4>Prévisualisation live</h4>
        <div id="review-preview" class="preview-card"></div>

        <div class="form-actions">
          <button type="submit" class="action-btn">Enregistrer</button>
          <button type="button" id="cancel-form" class="action-btn secondary">Annuler</button>
        </div>
      </form>

      <hr class="separator" />

      <div class="section-head">
        <h2>Gestion des tops</h2>
        <div class="manager-actions">
          <label class="select-inline" for="manager-tops-search">
            Recherche
            <input id="manager-tops-search" type="search" placeholder="Titre, catégorie, année..." />
          </label>
          <label class="select-inline" for="manager-tops-sort">
            Tri
            <select id="manager-tops-sort">
              <option value="date-desc">Plus récent</option>
              <option value="date-asc">Plus ancien</option>
            </select>
          </label>
          <button id="new-top" class="action-btn">Nouveau top</button>
        </div>
      </div>

      <div id="tops-manager-list" class="manager-list"></div>

      <form id="top-form" class="review-form hidden">
        <h3 id="top-form-title">Ajouter un top</h3>

        <div class="form-grid">
          <label>Titre <span class="field-hint field-required">obligatoire</span><input name="title" required /></label>
          <label>Catégorie <span class="field-hint field-required">obligatoire</span>
            <select name="category" required>
              <option value="jeu">Jeux-vidéo</option>
              <option value="film" selected>Films</option>
              <option value="serie">Séries</option>
              <option value="musique">Musiques</option>
              <option value="livre">Livres</option>
              <option value="autre">Autre</option>
            </select>
          </label>
          <label>Année / période<input name="year" placeholder="2025" /></label>
          <label>Statut <span class="field-hint field-required">obligatoire</span>
            <select name="status" required>
              <option value="published" selected>Publié</option>
              <option value="draft">Brouillon</option>
            </select>
          </label>
          <label>Image de couverture (URL) <span class="field-hint">optionnel</span><input name="cover" type="url" /></label>
        </div>

        <label>Sous-titre
          <textarea name="subtitle" rows="2" placeholder="Top 10 films 2025"></textarea>
        </label>

        <div class="media-head">
          <h4>Items du top</h4>
          <button type="button" id="add-top-item" class="action-btn secondary" aria-label="Ajouter un item">+</button>
        </div>
        <div id="top-items-list" class="blocks-list"></div>

        <div class="form-actions">
          <button type="submit" class="action-btn">Enregistrer</button>
          <button type="button" id="cancel-top-form" class="action-btn secondary">Annuler</button>
        </div>
      </form>
    </section>
  </main>

  <script src="assets/js/firebase-config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="assets/js/reviews.js"></script>
  <script src="assets/js/auth-ui.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
